<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Car Calculator">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ניתוח השוואתי: ליסינג תפעולי מול רכב יד שנייה</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple icon replacements
        const Car = ({ className }) => <div className={`${className} bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold`}>🚗</div>;
        const Trophy = ({ className }) => <div className={`${className} bg-yellow-500 rounded-full flex items-center justify-center text-2xl`}>🏆</div>;
        const Settings = ({ className }) => <div className={`${className} bg-indigo-600 rounded text-white text-xs flex items-center justify-center`}>⚙️</div>;
        const ChevronUp = ({ className }) => <span className={className}>▲</span>;
        const ChevronDown = ({ className }) => <span className={className}>▼</span>;

        const CarComparison = () => {
            // Basic parameters
            const [kmPerYear, setKmPerYear] = useState(20000);
            const [usedCarPrice, setUsedCarPrice] = useState(134000);
            const [sp500Return, setSp500Return] = useState(8);
            const [monthlyLease, setMonthlyLease] = useState(3450);
           // const [yearlyInsurance, setYearlyInsurance] = useState(600);
            const [taxRate, setTaxRate] = useState(25);
            const [oldCarValue, setOldCarValue] = useState(38000);
            const [isBusinessOwner, setIsBusinessOwner] = useState(true);
            const [availableCash, setAvailableCash] = useState(134000);
            const [loanInterestRate, setLoanInterestRate] = useState(6);

            // Missing parameters from original version
            const [leaseDownPayment, setLeaseDownPayment] = useState(4900);
            const [showAdvanced, setShowAdvanced] = useState(false);

            // Advanced configurable parameters
            const [fuelPrice, setFuelPrice] = useState(7);
            const [yearlyMaintenance, setYearlyMaintenance] = useState(1800);

            // Helper function for registration tax calculation
            const calculateRegistrationTax = (carValue) => {
                if (carValue <= 100000) return 2200;
                if (carValue <= 150000) return 2394;
                if (carValue <= 200000) return 2394;
                if (carValue <= 250000) return 3600;
                return 4200;
            };

            // Registration and Insurance - user input with auto-updating defaults
            const [leaseYearlyLicense, setLeaseYearlyLicense] = useState(calculateRegistrationTax(180000));
            const [usedYearlyLicense, setUsedYearlyLicense] = useState(calculateRegistrationTax(180000));
            const [leaseYearlyInsurance, setLeaseYearlyInsurance] = useState(6500);
            const [usedYearlyInsurance, setUsedYearlyInsurance] = useState(6500);

            // Lease inclusion flags
            const [leaseIncludesLicense, setLeaseIncludesLicense] = useState(true);
            const [leaseIncludesCoverageInsurance, setLeaseIncludesCoverageInsurance] = useState(true);
            const [leaseIncludesThirdParty, setLeaseIncludesThirdParty] = useState(true);
            const [leaseIncludesMaintenance, setLeaseIncludesMaintenance] = useState(true);

            // Investment strategy toggle
            const [useFullLoanStrategy, setUseFullLoanStrategy] = useState(false);

            // Car-specific parameters
            const [leaseCarValue, setLeaseCarValue] = useState(180000);
            const [usedCarValue, setUsedCarValue] = useState(180000);
            const [leaseCarFuelType, setLeaseCarFuelType] = useState('hybrid');
            const [usedCarFuelType, setUsedCarFuelType] = useState('gasoline');

            // Fuel consumption - user configurable with defaults
            const [leaseCarFuelConsumption, setLeaseCarFuelConsumption] = useState(22);
            const [usedCarFuelConsumption, setUsedCarFuelConsumption] = useState(14);

            // Auto-update registration tax when car values change
            useEffect(() => {
                setLeaseYearlyLicense(calculateRegistrationTax(leaseCarValue));
            }, [leaseCarValue]);

            useEffect(() => {
                setUsedYearlyLicense(calculateRegistrationTax(usedCarValue));
            }, [usedCarValue]);

            // Auto-calculate maintenance multiplier based on fuel type
            const getMaintenanceMultiplier = (fuelType) => {
                switch(fuelType) {
                    case 'hybrid': return 1.2;
                    case 'gasoline': return 1.0;
                    case 'electric': return 0.8;
                    default: return 1.0;
                }
            };

            // Get insurance cost - user input
            const getInsuranceCost = (isLeased) => {
                return isLeased ? leaseYearlyInsurance : usedYearlyInsurance;
            };

            const calcFuelCost = (km, fuelType, fuelConsumption) => {
                if (fuelType === 'electric') {
                    return 0; // Electric cars have no fuel cost
                }
                return (km / fuelConsumption) * fuelPrice;
            };

            const calcDepreciation = (years, initialPrice) => {
                let value = initialPrice;
                for (let i = 0; i < years; i++) {
                    if (i === 0) value *= 0.85;
                    else if (i === 1) value *= 0.88;
                    else value *= 0.90;
                }
                return initialPrice - value;
            };

            const calcInvestmentReturn = (principal, years, rate) => {
                return principal * Math.pow(1 + rate/100, years) - principal;
            };

            const calcMonthlyInvestmentReturn = (monthlyAmount, years, annualRate) => {
                const monthlyRate = annualRate / 100 / 12;
                const months = years * 12;
                const futureValue = monthlyAmount * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate);
                const totalInvested = monthlyAmount * months;
                return {
                    profit: futureValue - totalInvested,
                    futureValue: futureValue,
                    totalInvested: totalInvested
                };
            };

            const calcOperationalLease = (years) => {
                const monthlyPayments = monthlyLease * 12 * years;
                const totalPaid = monthlyPayments + leaseDownPayment;
                const fuelCost = calcFuelCost(kmPerYear * years, leaseCarFuelType, leaseCarFuelConsumption);

                // Calculate additional costs based on what's NOT included in lease
                let additionalCosts = 0;
                let additionalCostsBreakdown = {};

                if (!leaseIncludesLicense) {
                    additionalCosts += leaseYearlyLicense * years;
                    additionalCostsBreakdown.license = leaseYearlyLicense * years;
                }

                const leaseInsuranceCost = getInsuranceCost(true) * years;
                if (!leaseIncludesCoverageInsurance || !leaseIncludesThirdParty) {
                    additionalCosts += leaseInsuranceCost;
                    additionalCostsBreakdown.insurance = leaseInsuranceCost;
                }

                if (!leaseIncludesMaintenance) {
                    const maintenanceCost = yearlyMaintenance * getMaintenanceMultiplier(leaseCarFuelType) * years;
                    additionalCosts += maintenanceCost;
                    additionalCostsBreakdown.maintenance = maintenanceCost;
                }

                const totalExpenses = totalPaid + fuelCost + additionalCosts;
                const recognizedExpenses = totalExpenses * 0.45;
                const taxReturn = isBusinessOwner ? (recognizedExpenses * (taxRate / 100)) : 0;

                // Investment calculation - full value accounting
                const investmentCapital = Math.round(availableCash + oldCarValue);
                const investmentGain = Math.round(calcInvestmentReturn(investmentCapital, years, sp500Return));
                const fullInvestmentValue = investmentCapital + investmentGain;

                // Calculate direct costs and final position
                const directCosts = totalExpenses - taxReturn;
                const finalLiquidCash = fullInvestmentValue;
                const finalCarValue = 0;
                const finalNetWorth = finalLiquidCash;

                return {
                    monthlyPayment: monthlyLease,
                    monthlyPayments,
                    downPayment: leaseDownPayment,
                    totalPaid,
                    fuelCost,
                    additionalCosts,
                    additionalCostsBreakdown,
                    totalExpenses,
                    recognizedExpenses,
                    taxReturn,
                    investmentCapital,
                    investmentGain,
                    fullInvestmentValue,
                    directCost: directCosts,
                    finalLiquidCash,
                    finalCarValue,
                    finalNetWorth,
                    netCost: directCosts
                };
            };

            const calcUsedCar = (years) => {
                const actualCarCost = Math.round(usedCarPrice - oldCarValue);

                let effectiveCash, loanAmount, needsLoan;

                if (useFullLoanStrategy) {
                    // Strategy: Take full loan, invest all cash
                    effectiveCash = 0;
                    loanAmount = actualCarCost;
                    needsLoan = true;
                } else {
                    // Strategy: Use cash first
                    effectiveCash = Math.round(availableCash);
                    needsLoan = effectiveCash < actualCarCost;
                    loanAmount = needsLoan ? Math.round(actualCarCost - effectiveCash) : 0;
                }

                let monthlyLoanPayment = 0, totalInterest = 0, interestTaxReturn = 0;

                if (needsLoan && loanAmount > 0) {
                    const months = years * 12;
                    const monthlyRate = loanInterestRate / 100 / 12;
                    monthlyLoanPayment = monthlyRate > 0 ?
                        loanAmount * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1) :
                        loanAmount / months;
                    totalInterest = monthlyLoanPayment * months - loanAmount;
                    interestTaxReturn = isBusinessOwner ? (totalInterest * (taxRate / 100)) : 0;
                }

                // Use car-specific calculations
                const insurance = getInsuranceCost(false) * years;
                const license = usedYearlyLicense * years;
                const maintenance = yearlyMaintenance * getMaintenanceMultiplier(usedCarFuelType) * years;
                const fuelCost = calcFuelCost(kmPerYear * years, usedCarFuelType, usedCarFuelConsumption);
                const depreciation = calcDepreciation(years, usedCarPrice);
                const remainingValue = usedCarPrice - depreciation;

                const totalExpensesForTax = insurance + license + maintenance + fuelCost + depreciation;
                const recognizedExpenses = totalExpensesForTax * 0.45;
                const taxReturn = isBusinessOwner ? (recognizedExpenses * (taxRate / 100)) : 0;

                // Investment calculation depends on strategy
                let monthlyInvestmentGain = 0;
                let lumpSumInvestmentGain = 0;
                let totalInvestmentValue = 0;
                let availableMonthlyForInvestment = 0;

                if (useFullLoanStrategy) {
                    // Strategy: Invest only הון זמין, ignore lease money completely
                    const investmentCapital = Math.round(availableCash); // Only available cash, not old car
                    lumpSumInvestmentGain = Math.round(calcInvestmentReturn(investmentCapital, years, sp500Return));
                    totalInvestmentValue = lumpSumInvestmentGain;
                    availableMonthlyForInvestment = 0; // No lease money consideration
                } else {
                    // Strategy: Treat saved lease money as כסף נזיל (no investment gains)
                    availableMonthlyForInvestment = monthlyLease - monthlyLoanPayment;
                    if (availableMonthlyForInvestment > 0) {
                        monthlyInvestmentGain = availableMonthlyForInvestment * years * 12; // Raw cash saved from not paying lease
                        totalInvestmentValue = monthlyInvestmentGain;
                    }
                }

                // Calculate direct costs and final position
                const directCosts = actualCarCost + insurance + license + maintenance + fuelCost + totalInterest - taxReturn - interestTaxReturn- remainingValue;
                const finalLiquidCash = useFullLoanStrategy ? (availableCash + totalInvestmentValue) : totalInvestmentValue;
                const finalCarValue = remainingValue;
                const finalNetWorth = finalLiquidCash; // Include car value in final assets

                return {
                    actualCarCost,
                    effectiveCash,
                    needsLoan,
                    loanAmount,
                    monthlyLoanPayment,
                    totalLoanPayments: monthlyLoanPayment * years * 12,
                    totalInterest,
                    interestTaxReturn,
                    insurance,
                    license,
                    maintenance,
                    fuelCost,
                    depreciation,
                    remainingValue,
                    taxReturn,
                    availableMonthlyForInvestment,
                    monthlyInvestmentGain,
                    lumpSumInvestmentGain,
                    totalInvestmentValue,
                    directCost: directCosts,
                    finalLiquidCash,
                    finalCarValue,
                    finalNetWorth,
                    investmentCapital: useFullLoanStrategy ? Math.round(availableCash) : 0,
                    netCost: directCosts
                };
            };

            const scenarios = [{ years: 3, label: '3 שנים' }, { years: 5, label: '5 שנים' }, { years: 10, label: '10 שנים' }];

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 md:p-8" dir="rtl">
                    <div className="max-w-7xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-2xl p-6 md:p-8 mb-8">
                            <div className="flex items-center gap-4 mb-6">
                                <Car className="w-10 h-10 md:w-12 md:h-12 text-indigo-600" />
                                <h1 className="text-2xl md:text-4xl font-bold text-gray-800">ניתוח השוואתי: ליסינג תפעולי מול רכב יד שנייה</h1>
                            </div>

                            <div className="mb-6">
                                <h3 className="text-lg font-bold text-gray-700 mb-4">⚙️ הגדרות בסיסיות</h3>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 bg-gradient-to-r from-indigo-50 to-purple-50 p-4 md:p-6 rounded-xl border-2 border-indigo-200">
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">ק"מ שנתי</label>
                                        <input type="number" value={kmPerYear} onChange={(e) => setKmPerYear(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">מחיר יד 2 (₪)</label>
                                        <input type="number" value={usedCarPrice} onChange={(e) => setUsedCarPrice(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">תשואת S&P (%)</label>
                                        <input type="number" step="0.5" value={sp500Return} onChange={(e) => setSp500Return(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">ליסינג חודשי (₪)</label>
                                        <input type="number" value={monthlyLease} onChange={(e) => setMonthlyLease(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">מקדמת ליסינג (₪)</label>
                                        <input type="number" value={leaseDownPayment} onChange={(e) => setLeaseDownPayment(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">מס שולי (%)</label>
                                        <input type="number" step="1" value={taxRate} onChange={(e) => setTaxRate(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">שווי רכב ישן (₪)</label>
                                        <input type="number" value={oldCarValue} onChange={(e) => setOldCarValue(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">💰 הון זמין (₪)</label>
                                        <input type="number" value={availableCash} onChange={(e) => setAvailableCash(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                        <div className="text-xs text-gray-500 mt-1">כמה כסף יש לכם פנוי?</div>
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">📊 ריבית הלוואה (%)</label>
                                        <input type="number" step="0.1" value={loanInterestRate} onChange={(e) => setLoanInterestRate(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                        <div className="text-xs text-gray-500 mt-1">במקרה שההון הזמין קטן ממחיר הרכב</div>
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">ביטוח ליסינג שנתי (₪)</label>
                                        <input type="number" value={leaseYearlyInsurance} onChange={(e) => setLeaseYearlyInsurance(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                        <div className="text-xs text-gray-500 mt-1">מקיף + צד ג</div>
                                    </div>
                                    <div>
                                        <label className="block text-xs md:text-sm font-semibold text-gray-700 mb-2">ביטוח יד 2 שנתי (₪)</label>
                                        <input type="number" value={usedYearlyInsurance} onChange={(e) => setUsedYearlyInsurance(+e.target.value)} className="w-full px-3 py-2 text-sm md:text-base border-2 border-indigo-200 rounded-lg focus:border-indigo-500 focus:outline-none" />
                                        <div className="text-xs text-gray-500 mt-1">מקיף + צד ג</div>
                                    </div>
                                    <div className="flex items-center">
                                        <label className="flex items-center gap-2 cursor-pointer">
                                            <input type="checkbox" checked={isBusinessOwner} onChange={(e) => setIsBusinessOwner(e.target.checked)} className="w-5 h-5" />
                                            <span className="text-xs md:text-sm font-semibold text-gray-700">עוסק מורשה/פטור<div className="text-xs text-gray-500 font-normal">(זכאי להחזר מס)</div></span>
                                        </label>
                                    </div>
                                </div>
                            </div>

                            {/* Car Specifications Section */}
                            <div className="mb-6">
                                <h3 className="text-lg font-bold text-gray-700 mb-4">🚗 מפרטי רכב</h3>
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                    {/* Lease Car Specs */}
                                    <div className="bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                                        <h4 className="font-bold text-blue-700 mb-3">רכב בליסינג</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-700 mb-2">שווי רכב (₪)</label>
                                                <input type="number" value={leaseCarValue} onChange={(e) => setLeaseCarValue(+e.target.value)} className="w-full px-3 py-2 text-sm border-2 border-blue-200 rounded-lg focus:border-blue-500 focus:outline-none" />
                                                <div className="text-xs text-gray-500 mt-1">לחישוב ביטוח ואגרת רישוי</div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-700 mb-2">סוג דלק</label>
                                                <select value={leaseCarFuelType} onChange={(e) => setLeaseCarFuelType(e.target.value)} className="w-full px-3 py-2 text-sm border-2 border-blue-200 rounded-lg focus:border-blue-500 focus:outline-none">
                                                    <option value="hybrid">היברידי</option>
                                                    <option value="gasoline">בנזין</option>
                                                    <option value="electric">חשמלי</option>
                                                </select>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-semibold text-gray-700 mb-2">צריכת דלק (ק"מ/ליטר)</label>
                                                <input
                                                    type="number"
                                                    step="0.1"
                                                    value={leaseCarFuelConsumption}
                                                    onChange={(e) => setLeaseCarFuelConsumption(+e.target.value)}
                                                    className="w-full px-3 py-2 text-sm border-2 border-blue-200 rounded-lg focus:border-blue-500 focus:outline-none"
                                                    disabled={leaseCarFuelType === 'electric'}
                                                />
                                                <div className="text-xs text-gray-500 mt-1">{leaseCarFuelType === 'electric' ? 'לא רלוונטי לרכב חשמלי' : 'צריכת דלק בפועל'}</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Used Car Specs */}
                                    <div className="bg-green-50 p-4 rounded-xl border-2 border-green-200">
                                        <h4 className="font-bold text-green-700 mb-3">רכב יד שנייה</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-700 mb-2">שווי רכב (₪)</label>
                                                <input type="number" value={usedCarValue} onChange={(e) => setUsedCarValue(+e.target.value)} className="w-full px-3 py-2 text-sm border-2 border-green-200 rounded-lg focus:border-green-500 focus:outline-none" />
                                                <div className="text-xs text-gray-500 mt-1">לחישוב ביטוח ואגרת רישוי</div>
                                            </div>
                                            <div>
                                                <label className="block text-xs font-semibold text-gray-700 mb-2">סוג דלק</label>
                                                <select value={usedCarFuelType} onChange={(e) => setUsedCarFuelType(e.target.value)} className="w-full px-3 py-2 text-sm border-2 border-green-200 rounded-lg focus:border-green-500 focus:outline-none">
                                                    <option value="gasoline">בנזין</option>
                                                    <option value="hybrid">היברידי</option>
                                                    <option value="electric">חשמלי</option>
                                                </select>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-xs font-semibold text-gray-700 mb-2">צריכת דלק (ק"מ/ליטר)</label>
                                                <input
                                                    type="number"
                                                    step="0.1"
                                                    value={usedCarFuelConsumption}
                                                    onChange={(e) => setUsedCarFuelConsumption(+e.target.value)}
                                                    className="w-full px-3 py-2 text-sm border-2 border-green-200 rounded-lg focus:border-green-500 focus:outline-none"
                                                    disabled={usedCarFuelType === 'electric'}
                                                />
                                                <div className="text-xs text-gray-500 mt-1">{usedCarFuelType === 'electric' ? 'לא רלוונטי לרכב חשמלי' : 'צריכת דלק בפועל'}</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Lease Inclusions Section */}
                            <div className="mb-6">
                                <h3 className="text-lg font-bold text-gray-700 mb-4">📋 מה כולל הליסינג?</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 bg-blue-50 p-4 rounded-xl border-2 border-blue-200">
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={leaseIncludesLicense} onChange={(e) => setLeaseIncludesLicense(e.target.checked)} className="w-5 h-5" />
                                        <span className="text-sm font-semibold">אגרת רישוי</span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" checked={leaseIncludesCoverageInsurance} onChange={(e) => setLeaseIncludesCoverageInsurance(e.target.checked)} className="w-5 h-5" />
